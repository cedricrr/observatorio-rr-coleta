# Stack local de desenvolvimento da busca: solr + postgres + api.
# Produção é no Railway (3 serviços equivalentes; ver README.md).
services:
  solr:
    build: ./solr
    environment:
      SOLR_HEAP: 512m
      SOLR_MODULES: analysis-extras
    volumes:
      - solr-data:/var/solr
    ports:
      - "8983:8983" # admin local; em produção o Solr NÃO tem domínio público

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: leads
      POSTGRES_USER: leads
      POSTGRES_PASSWORD: leads
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: ./api
    environment:
      SOLR_URL: http://solr:8983/solr/diarios
      DATABASE_URL: postgresql://leads:leads@postgres:5432/leads
      SEARCH_API_TOKEN: dev-token
      SESSION_SECRET: dev-secret
      CORS_ALLOWED_ORIGINS: "http://localhost:8000"
      R2_PUBLIC_DOMAIN: observatoriorr.com.br
    ports:
      - "8080:8080"
    depends_on:
      - solr
      - postgres

volumes:
  solr-data:
  pg-data:
