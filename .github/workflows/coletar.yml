name: Jornal diário (coleta + editorial + publicação)

on:
  schedule:
    # Roraima é UTC-4 fixo (sem horário de verão). Espelha o launchd local:
    # 09h Roraima = 13 UTC, 18h Roraima = 22 UTC.
    - cron: "0 13 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      data:
        description: "Data alvo (hoje, ontem, ou YYYY-MM-DD)"
        type: string
        default: "hoje"
      fonte:
        description: "Fonte"
        type: choice
        options:
          - mprr
          - tjrr
          - todas
        default: todas

permissions:
  contents: write

jobs:
  jornal:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Instalar dependências
        run: pip install -e ".[dev]"

      - name: Gerar jornal (coleta inline + editorial)
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          data="${{ github.event.inputs.data || 'hoje' }}"
          fonte="${{ github.event.inputs.fonte || 'todas' }}"
          python -m scripts.jornal_diario --data "$data" --fonte "$fonte"

      - name: Publicar jornal e índice no R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          data="${{ github.event.inputs.data || 'hoje' }}"
          python -m scripts.publicar --data "$data"

      - name: Commit dos JSONs novos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/diarios/
          if git diff --cached --quiet; then
            echo "Nenhum diário novo coletado nesta execução."
            exit 0
          fi
          data_iso=$(date -u +"%Y-%m-%d")
          git commit -m "chore(data): coleta automática de ${data_iso}" \
                     -m "Execução agendada do workflow coletar.yml (pipeline completo)." \
                     -m "Run ID: ${{ github.run_id }}"
          git push
